<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於陳唯安</title>
    <style>
        /* 基礎設定 - 音樂深色調風格 */
        body {
            background-color: #1a1a1a; /* 深邃黑背景 */
            color: #e0e0e0; /* 淺灰色字體 */
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            line-height: 1.6;
            background-image: linear-gradient(rgba(26, 26, 26, 0.95), rgba(26, 26, 26, 0.95)),
                              repeating-linear-gradient(0deg, transparent, transparent 39px, #222 40px); /* 模擬五線譜背景線 */
        }

        /* 卡片容器 */
        .container {
            background-color: #2d2d2d;
            padding: 40px;
            border-radius: 15px; /* 較為俐落的圓角 */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border-top: 4px solid #d4af37; /* 金屬金點綴 */
        }

        /* 標題樣式 - 具藝術氣息 */
        h1 {
            color: #d4af37; /* 典雅金 */
            font-size: 2.2rem;
            margin-bottom: 5px;
            letter-spacing: 4px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        h2 {
            color: #a0a0a0;
            font-size: 1rem;
            font-weight: 300;
            margin-top: 0;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 段落與文字 */
        p {
            font-size: 1rem;
            margin: 15px 0;
            color: #cccccc;
        }

        /* 裝飾線 */
        hr {
            border: none;
            border-top: 1px solid #444;
            margin: 25px 0;
        }

        /* 聯絡資訊樣式 */
        .contact {
            font-size: 0.85rem;
            color: #888;
            font-family: 'Courier New', Courier, monospace; /* 類標籤字體 */
        }

        /* 按鈕樣式 - 類黑膠或音控按鈕風格 */
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background-color: transparent;
            color: #d4af37;
            text-decoration: none;
            border: 1px solid #d4af37;
            border-radius: 4px;
            transition: 0.4s;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .btn:hover {
            background-color: #d4af37;
            color: #1a1a1a;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>陳唯安</h1>

        <h2>Musician & Rhythm Explorer</h2>

        <p>
            我是一個沉浸於旋律的人，<br>
            擅長用音符捕捉生活中的細微情感。<br>
            每當靈感湧現，我便會拿起吉他，<br>
            將心情編織成動人的樂章。
        </p>

        <hr>

        <div class="contact">
            Email: s154119@elvs.chc.edu.com<br>
            Phone: 0930522622
        </div>

        <a href="index.html" class="btn">BACK TO HOME</a>
    </div>

</body>
</html>
